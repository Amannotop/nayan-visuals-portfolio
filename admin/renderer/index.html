<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayan Visuals Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Nayan Visuals Admin</h1>
        <span id="status"></span>
    </header>

    <div class="container">
        <div class="sidebar">
            <button class="btn btn-primary" id="addBtn">+ New Entry</button>
            <div class="entry-list" id="entryList"></div>
        </div>

        <main>
            <div class="empty-state" id="emptyState">
                <h2>Select or create an entry</h2>
                <p>Click "+ New Entry" to add a video to your portfolio.</p>
            </div>

            <form id="form" class="form" style="display:none">
                <div class="form-row">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="gameplay">Gaming Edit</option>
                            <option value="video">Cinematic Video</option>
                            <option value="color-grading">Color Grading</option>
                            <option value="motion-graphics">Social Media</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="2" required></textarea>
                </div>
                <div class="form-group">
                    <label for="videoUrl">YouTube URL</label>
                    <input type="url" id="videoUrl" placeholder="https://youtube.com/watch?v=..." required>
                </div>
                <div class="thumbnail-preview" id="thumbnailPreview" style="display:none">
                    <img id="thumbnailImg" alt="Thumbnail preview">
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
                    <button type="button" class="btn btn-danger" id="deleteBtn">Delete</button>
                    <button type="button" class="btn btn-outline" id="cancelBtn">Cancel</button>
                </div>
            </form>

            <div class="push-section" id="pushSection">
                <input type="text" id="commitMsg" placeholder="Commit message..." value="update portfolio">
                <button class="btn btn-primary" id="pushBtn">Push to GitHub</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
