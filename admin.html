<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Nayan Visuals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">

    <div class="admin-header">
        <h1><i class="fas fa-cog" style="color:#7c3aed;margin-right:10px;"></i>Nayan Visuals Admin</h1>
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
    </div>

    <div class="admin-container">

        <!-- Add/Edit Form -->
        <div class="admin-form" id="videoForm">
            <h2 id="formTitle">Add New Video</h2>
            <input type="hidden" id="editId" value="">
            <div class="form-row">
                <input type="text" id="videoTitle" placeholder="Video Title" required>
                <input type="text" id="videoDesc" placeholder="Short Description" required>
            </div>
            <div class="form-row">
                <select id="videoCategory">
                    <option value="gameplay">Gaming Edit</option>
                    <option value="video">Cinematic Video</option>
                    <option value="color-grading">Color Grading</option>
                    <option value="motion-graphics">Social Media</option>
                </select>
                <select id="videoIcon">
                    <option value="fa-gamepad">Gamepad</option>
                    <option value="fa-film">Film</option>
                    <option value="fa-palette">Palette</option>
                    <option value="fa-magic">Magic</option>
                    <option value="fa-play-circle">Play Circle</option>
                    <option value="fa-video">Video</option>
                </select>
            </div>
            <input type="text" id="videoUrl" placeholder="Video URL (YouTube/Vimeo embed link)">
            <input type="text" id="videoThumbnail" placeholder="Thumbnail Image URL (optional)">
            <div class="btn-group">
                <button class="btn-small btn-primary-small" onclick="saveVideo()">
                    <i class="fas fa-save"></i> Save Video
                </button>
                <button class="btn-small btn-outline-small" onclick="resetForm()">
                    <i class="fas fa-times"></i> Cancel
                </button>
            </div>
        </div>

        <!-- Video List -->
        <div id="videoListContainer">
            <h2 style="font-size:18px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
                <span><i class="fas fa-list" style="color:#7c3aed;margin-right:8px;"></i>Your Videos</span>
                <span id="videoCount" style="font-size:13px;color:#808098;font-weight:400;"></span>
            </h2>
            <div class="video-list" id="videoList"></div>
            <div class="admin-actions">
                <button class="btn-small btn-outline-small" onclick="loadDefaultData()">
                    <i class="fas fa-undo"></i> Reset to Defaults
                </button>
                <button class="btn-small btn-primary-small" onclick="downloadJSON()">
                    <i class="fas fa-download"></i> Download portfolio.json
                </button>
            </div>
        </div>

    </div>

    <script>
        let videos = [];

        async function loadVideos() {
            try {
                const res = await fetch('data/portfolio.json');
                videos = await res.json();
                renderList();
            } catch (err) {
                console.error('Failed to load:', err);
                videos = [];
                renderList();
            }
        }

        function renderList() {
            const list = document.getElementById('videoList');
            const count = document.getElementById('videoCount');

            if (videos.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-video-slash"></i>
                        <p>No videos yet. Add your first one above!</p>
                    </div>
                `;
                count.textContent = '0 videos';
                return;
            }

            count.textContent = videos.length + ' video' + (videos.length > 1 ? 's' : '');

            const catLabels = { 'gameplay': 'Gaming Edit', 'video': 'Cinematic Video', 'color-grading': 'Color Grading', 'motion-graphics': 'Social Media' };
            list.innerHTML = videos.map(v => `
                <div class="video-list-item">
                    <div class="info">
                        <h4>${v.title}</h4>
                        <p>${v.description}</p>
                        <span class="badge">${catLabels[v.category] || v.category}</span>
                    </div>
                    <div class="actions">
                        <button class="btn-small btn-outline-small" onclick="editVideo(${v.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-small btn-danger-small" onclick="deleteVideo(${v.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function saveVideo() {
            const id = document.getElementById('editId').value;
            const title = document.getElementById('videoTitle').value.trim();
            const description = document.getElementById('videoDesc').value.trim();
            const category = document.getElementById('videoCategory').value;
            const icon = document.getElementById('videoIcon').value;
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const thumbnail = document.getElementById('videoThumbnail').value.trim();

            if (!title || !description) {
                alert('Title and description are required!');
                return;
            }

            if (id) {
                const idx = videos.findIndex(v => v.id == id);
                if (idx !== -1) {
                    videos[idx] = { ...videos[idx], title, description, category, icon, videoUrl, thumbnail };
                }
            } else {
                const newId = videos.length > 0 ? Math.max(...videos.map(v => v.id)) + 1 : 1;
                videos.push({ id: newId, title, description, category, icon, videoUrl, thumbnail });
            }

            resetForm();
            renderList();
        }

        function editVideo(id) {
            const v = videos.find(v => v.id === id);
            if (!v) return;

            document.getElementById('editId').value = v.id;
            document.getElementById('videoTitle').value = v.title;
            document.getElementById('videoDesc').value = v.description;
            document.getElementById('videoCategory').value = v.category;
            document.getElementById('videoIcon').value = v.icon || 'fa-play-circle';
            document.getElementById('videoUrl').value = v.videoUrl || '';
            document.getElementById('videoThumbnail').value = v.thumbnail || '';
            document.getElementById('formTitle').textContent = 'Edit Video';

            document.getElementById('videoForm').scrollIntoView({ behavior: 'smooth' });
        }

        function deleteVideo(id) {
            if (!confirm('Delete this video entry?')) return;
            videos = videos.filter(v => v.id !== id);
            if (document.getElementById('editId').value == id) resetForm();
            renderList();
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoDesc').value = '';
            document.getElementById('videoCategory').value = 'gameplay';
            document.getElementById('videoIcon').value = 'fa-gamepad';
            document.getElementById('videoUrl').value = '';
            document.getElementById('videoThumbnail').value = '';
            document.getElementById('formTitle').textContent = 'Add New Video';
        }

        function downloadJSON() {
            const json = JSON.stringify(videos, null, 4);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'portfolio.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert('portfolio.json downloaded!\n\nReplace the file in data/ folder with this new one and push to GitHub to update your site.');
        }

        function loadDefaultData() {
            if (!confirm('Replace all videos with default sample data?')) return;
            videos = [
                { id: 1, title: 'Epic Gaming Montage', description: 'Valorant highlights', category: 'gameplay', icon: 'fa-gamepad', thumbnail: '', videoUrl: '' },
                { id: 2, title: 'Music Visualizer', description: 'Cinematic music video', category: 'video', icon: 'fa-film', thumbnail: '', videoUrl: '' },
                { id: 3, title: 'Short Film Edit', description: 'Narrative storytelling', category: 'video', icon: 'fa-film', thumbnail: '', videoUrl: '' },
                { id: 4, title: 'Color Grade Showcase', description: 'Before/after comparison', category: 'color-grading', icon: 'fa-palette', thumbnail: '', videoUrl: '' },
                { id: 5, title: 'Motion Reel', description: 'Custom animations & VFX', category: 'motion-graphics', icon: 'fa-magic', thumbnail: '', videoUrl: '' },
                { id: 6, title: 'Vlog Compilation', description: 'Engaging vlog content', category: 'video', icon: 'fa-film', thumbnail: '', videoUrl: '' }
            ];
            resetForm();
            renderList();
        }

        loadVideos();
    </script>

</body>
</html>
